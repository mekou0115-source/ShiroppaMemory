<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>しろっぱ神経衰弱</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">

    <h1>🦷 しろっぱ神経衰弱 🦷</h1>

    <p class="message">
        カードをクリックして同じしろっぱを見つけよう！
    </p>

    <div class="info">
        <div>
            そろえたペア：
            <span id="score">0</span> / 6

        <button id="restart">
            もう一度遊ぶ

    </div>

    <div id="game"></div>

    <div id="result" class="hidden">

        🎉 おめでとう！ 🎉<br>

        全部そろったよ！

    </div>

</div>

<script src="script.js"></script>

</body>
</html>
